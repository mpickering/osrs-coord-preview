name: Test PR Comment

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

jobs:
  comment-test:
    if: contains(github.event.pull_request.labels.*.name, 'test-pr-comment')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build action
        run: npm run build

      - name: Run action with PR comment enabled
        uses: ./
        with:
          coordinates: >-
            [{"coordinate":"2701/3408/0","label":"Test coordinate","source":"label:test-pr-comment"}]
          comment: "true"
          upload-to-0x0: "true"
          github-token: ${{ github.token }}
